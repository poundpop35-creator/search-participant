<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — กรมวิทยาศาสตร์การแพทย์</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:linear-gradient(rgba(232,240,254,0.60),rgba(232,240,254,0.60)),url('../DNA.png') center/cover fixed;font-family:'Sarabun',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .box{background:white;border-radius:24px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
    .logo{text-align:center;margin-bottom:28px;}
    .logo-icon{font-size:2.5rem;}
    .logo h1{font-size:1.1rem;font-weight:700;color:#0d2b6b;margin-top:10px;line-height:1.5;}
    .logo p{font-size:0.8rem;color:#94a3b8;margin-top:4px;}
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:0.82rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px;}
    .field input{width:100%;padding:12px 16px;border-radius:12px;border:2px solid #e2e8f0;font-family:'Sarabun',sans-serif;font-size:1rem;color:#1e293b;outline:none;transition:border .15s;}
    .field input:focus{border-color:#1a4eb8;}
    .btn-login{width:100%;padding:14px;border-radius:12px;border:none;background:#0d2b6b;color:white;font-family:'Sarabun',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px;}
    .btn-login:hover{opacity:0.88;}
    .err{color:#dc2626;font-size:0.85rem;text-align:center;margin-top:10px;min-height:20px;}
    .divider{display:flex;align-items:center;gap:10px;margin:20px 0 14px;}
    .divider-line{flex:1;height:1px;background:#e2e8f0;}
    .divider-text{font-size:0.75rem;color:#94a3b8;}
    .link-btn{display:block;width:100%;padding:11px;border-radius:12px;border:2px solid #e2e8f0;background:white;font-family:'Sarabun',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;color:#64748b;text-align:center;text-decoration:none;}
    .link-btn:hover{background:#f8fafc;border-color:#c7d7f5;color:#0d2b6b;}
  </style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
      <img src="../logo-%E0%B8%9B%E0%B8%A3%E0%B8%B0%E0%B8%8A%E0%B8%B8%E0%B8%A1%E0%B8%A7%E0%B8%B4%E0%B8%8A%E0%B8%B2%E0%B8%81%E0%B8%B2%E0%B8%A3-34-Final_0.png" style="height:48px;object-fit:contain;" alt="conference">
      <img src="../logo-DMSc-MOPH%20(1)%20(2)_0.png" style="height:48px;object-fit:contain;" alt="dmsc">
      <!-- <img src="../%E0%B8%AA%E0%B8%B3%E0%B9%80%E0%B8%99%E0%B8%B2%E0%B8%82%E0%B8%AD%E0%B8%87%20%E0%B9%82%E0%B8%A5%E0%B9%82%E0%B8%81%E0%B9%89.png" style="height:50px;object-fit:contain;border-radius:8px;" alt="DPTC"> -->
    </div>
    <h1>ระบบเช็คอินหน้างาน<br>กรมวิทยาศาสตร์การแพทย์</h1>
    <p>สำหรับเจ้าหน้าที่เท่านั้น</p>
  </div>
  <div class="field">
    <label>ชื่อผู้ใช้</label>
    <input type="text" id="username" placeholder="staff01" autocomplete="username"
      onkeydown="if(event.key==='Enter')document.getElementById('password').focus()">
  </div>
  <div class="field">
    <label>รหัสผ่าน</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <button class="btn-login" onclick="doLogin()">เข้าสู่ระบบ</button>
  <div class="err" id="errMsg"></div>
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">หรือ</div>
    <div class="divider-line"></div>
  </div>
  <a class="link-btn" href="public.html">ดูหน้า Live Dashboard (สาธารณะ)</a>
</div>
<script>
const SB_URL  = "https://gvxytnjfyepqhbkmcjms.supabase.co";
const SB_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2eHl0bmpmeWVwcWhia21jam1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MzE2NDAsImV4cCI6MjA5NTAwNzY0MH0.RAr_ehb4cxfNliDR0h5XcihUaP-0ltZTTGIAv2Fw1kk";
const USERS = {
  'adminpound':'P@und0258',
  'staff01':'Dmsc@2569','staff02':'Dmsc@2569','staff03':'Dmsc@2569',
  'staff04':'Dmsc@2569','staff05':'Dmsc@2569','staff06':'Dmsc@2569',
  'staff07':'Dmsc@2569','staff08':'Dmsc@2569','staff09':'Dmsc@2569','staff10':'Dmsc@2569'
};
const _next = new URLSearchParams(window.location.search).get('next') || 'index.html';
if(sessionStorage.getItem('dmsc_auth')==='ok') window.location.href = _next;

async function doLogin(){
  const u   = document.getElementById('username').value.trim().toLowerCase();
  const p   = document.getElementById('password').value;
  const err = document.getElementById('errMsg');
  const btn = document.querySelector('.btn-login');
  if(!u||!p){ err.textContent='กรุณากรอกชื่อผู้ใช้และรหัสผ่าน'; return; }
  if(!USERS[u]||USERS[u]!==p){
    err.textContent='ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
    document.getElementById('password').value='';
    document.getElementById('password').focus();
    return;
  }
  btn.textContent='กำลังตรวจสอบ...'; btn.disabled=true; err.textContent='';
  try{
    if(u !== 'adminpound'){
      const sessRes = await fetch(
        `${SB_URL}/rest/v1/staff_sessions?username=eq.${encodeURIComponent(u)}&select=username,last_active`,
        {headers:{'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON}, cache:'no-store'}
      );
      let sessions = [];
      if(sessRes.ok){
        sessions = await sessRes.json();
      } else {
        const errBody = await sessRes.text().catch(()=>'');
        err.textContent = `[DB GET error ${sessRes.status}] ${errBody.substring(0,120)}`;
        btn.textContent='เข้าสู่ระบบ'; btn.disabled=false;
        return;
      }
      if(Array.isArray(sessions) && sessions.length > 0){
        const diff = (Date.now() - new Date(sessions[0].last_active)) / 60000;
        if(diff < 2){
          err.textContent = u + ' ถูกใช้งานอยู่แล้ว กรุณาใช้รหัสอื่น';
          btn.textContent='เข้าสู่ระบบ'; btn.disabled=false;
          return;
        }
      }
      await fetch(`${SB_URL}/rest/v1/staff_sessions?username=eq.${encodeURIComponent(u)}`,{
        method:'DELETE', headers:{'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON}
      });
    }
    const postRes = await fetch(`${SB_URL}/rest/v1/staff_sessions`,{
      method:'POST',
      headers:{'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON,
               'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({username:u, logged_in_at:new Date().toISOString(), last_active:new Date().toISOString()})
    });
    if(!postRes.ok){
      const t=await postRes.text();
      err.textContent='Session error '+postRes.status+': '+t.substring(0,120);
      btn.textContent='เข้าสู่ระบบ'; btn.disabled=false;
      return;
    }
    sessionStorage.setItem('dmsc_auth','ok');
    sessionStorage.setItem('dmsc_user', u);
    sessionStorage.setItem('dmsc_role', u==='adminpound'?'admin':'staff');
    window.location.href = _next;
  }catch(e){
    err.textContent='ไม่สามารถเชื่อมต่อได้ กรุณาลองใหม่';
    btn.textContent='เข้าสู่ระบบ'; btn.disabled=false;
  }
}
</script>
</body>
</html>
