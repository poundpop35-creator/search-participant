<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ระบบสแกนผู้ส่งผลงาน — กรมวิทยาศาสตร์การแพทย์</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--blue:#0d2b6b;--blue-light:#e8f0fe;--green:#16a34a;--yellow:#d97706;--red:#dc2626;--white:#fff;--shadow:0 4px 24px rgba(13,43,107,0.13);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:linear-gradient(rgba(232,240,254,0.60),rgba(232,240,254,0.60)),url('https://raw.githubusercontent.com/poundpop35-creator/search-participant/main/DNA.png') center/cover fixed;font-family:'Sarabun',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 0;}
    .card{background:var(--white);border-radius:20px;box-shadow:var(--shadow);padding:20px;width:calc(100% - 32px);max-width:440px;}
    .row-label{font-size:0.82rem;font-weight:700;color:var(--blue);margin-bottom:6px;}
    .mode-toggle{display:flex;gap:8px;margin-bottom:16px;}
    .mode-btn{flex:1;padding:10px;border-radius:12px;border:2px solid #c7d7f5;font-family:'Sarabun',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;background:white;color:#64748b;}
    .mode-btn.active{background:var(--blue);color:white;border-color:var(--blue);}
    .scan-toggle{display:flex;gap:8px;margin-bottom:12px;}
    .scan-btn{flex:1;padding:9px;border-radius:12px;border:2px solid #c7d7f5;font-family:'Sarabun',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;background:white;color:#64748b;}
    .scan-btn.active{background:var(--blue);color:white;border-color:var(--blue);}
    #reader-container{border-radius:16px;overflow:hidden;border:3px solid #c7d7f5;background:#000;width:100%;min-height:260px;display:flex;align-items:center;justify-content:center;}
    #reader{width:100%;}
    video{width:100%!important;border-radius:0!important;}
    .scanner-mode{display:none;}
    .scan-hint{font-size:0.8rem;color:#94a3b8;text-align:center;margin-bottom:8px;}
    .scan-input{width:100%;padding:14px 16px;border-radius:12px;border:2px solid #c7d7f5;font-family:'Sarabun',sans-serif;font-size:1rem;color:#1e293b;outline:none;background:#f8fafc;margin-bottom:8px;}
    .scan-status-box{background:#f8fafc;border:2px solid #c7d7f5;border-radius:12px;padding:12px;text-align:center;font-size:0.88rem;color:#64748b;}
    .divider{display:flex;align-items:center;gap:10px;margin:16px 0;}
    .divider-line{flex:1;height:1px;background:#e2e8f0;}
    .divider-text{font-size:0.78rem;color:#94a3b8;white-space:nowrap;}
    .manual-wrap{display:flex;gap:8px;}
    .manual-input{flex:1;padding:11px 14px;border-radius:12px;border:2px solid #c7d7f5;font-family:'Sarabun',sans-serif;font-size:0.95rem;color:#1e293b;outline:none;}
    .manual-input:focus{border-color:var(--blue);}
    .manual-btn{padding:11px 18px;border-radius:12px;border:none;background:var(--blue);color:white;font-family:'Sarabun',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;}
    .counter{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;background:var(--blue-light);border-radius:12px;padding:10px;font-size:0.9rem;color:var(--blue);}
    .counter strong{font-size:1.3rem;font-weight:700;}
    .counter-sub{font-size:0.75rem;color:#94a3b8;text-align:center;margin-top:4px;}
    .btn-nav{display:block;width:100%;margin-top:8px;padding:11px;border-radius:12px;border:none;font-family:'Sarabun',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;}
    .btn-nav.primary{background:var(--blue);color:white;}
    .btn-nav.secondary{background:white;border:2px solid #c7d7f5;color:#64748b;}
    .btn-nav.danger{background:#dc2626;color:white;}
    .status-bar{display:flex;align-items:center;gap:6px;font-size:0.78rem;color:#64748b;margin-top:12px;justify-content:center;}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 1s linear infinite;margin:60px auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .err-msg{color:#fff;text-align:center;font-size:0.85rem;padding:16px;}
    .retry-btn{display:block;margin:8px auto 16px;padding:8px 20px;border-radius:20px;background:#1a4eb8;color:white;border:none;font-family:'Sarabun',sans-serif;font-size:0.9rem;cursor:pointer;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
    .modal-overlay.hidden{display:none;}
    .modal{background:white;border-radius:20px;padding:24px 22px 20px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,0.25);animation:slideUp .25s cubic-bezier(.34,1.56,.64,1);text-align:center;}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
    .modal-status{font-size:0.82rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;}
    .modal-status.success{color:var(--green);}
    .modal-status.warning{color:var(--yellow);}
    .modal-status.error{color:var(--red);}
    .modal-title{font-size:1.15rem;font-weight:700;color:#1e293b;margin-bottom:4px;}
    .modal-name{font-size:1rem;font-weight:600;color:var(--blue);margin-bottom:14px;}
    .modal-detail{background:#f8fafc;border-radius:12px;padding:12px 14px;margin-bottom:16px;text-align:left;border:1px solid #e2e8f0;}
    .detail-row{display:flex;align-items:baseline;padding:4px 0;border-bottom:1px solid #f1f5f9;font-size:0.88rem;}
    .detail-row:last-child{border-bottom:none;}
    .detail-label{color:#64748b;min-width:110px;flex-shrink:0;}
    .detail-val{color:#1e293b;font-weight:600;}
    .detail-val.done{color:var(--red);}
    .detail-val.ok{color:var(--green);}
    .detail-val.warn{color:var(--yellow);}
    .btn-ok{width:100%;padding:13px;border-radius:12px;border:none;font-family:'Sarabun',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;}
    .btn-ok.success{background:var(--green);color:white;}
    .btn-ok.warning{background:var(--yellow);color:white;}
    .btn-ok.error{background:var(--red);color:white;}
  </style>
</head>
<body>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-status" id="modalStatus"></div>
    <div class="modal-title"  id="modalTitle"></div>
    <div class="modal-name"   id="modalName"></div>
    <div class="modal-detail" id="modalDetail" style="display:none"></div>
    <button class="btn-ok success" id="btnOk" onclick="closeModal()">ตกลง</button>
  </div>
</div>

<div class="card">
  <div style="text-align:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #f1f5f9;">
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;">
      <img src="https://raw.githubusercontent.com/poundpop35-creator/search-participant/main/logo-%E0%B8%9B%E0%B8%A3%E0%B8%B0%E0%B8%8A%E0%B8%B8%E0%B8%A1%E0%B8%A7%E0%B8%B4%E0%B8%8A%E0%B8%B2%E0%B8%81%E0%B8%B2%E0%B8%A3-34-Final_0.png" style="height:48px;object-fit:contain;" alt="conf">
      <img src="https://raw.githubusercontent.com/poundpop35-creator/search-participant/main/logo-DMSc-MOPH%20(1)%20(2)_0.png" style="height:48px;object-fit:contain;" alt="dmsc">
    </div>
    <div style="font-size:1.05rem;font-weight:700;color:#0d2b6b;line-height:1.5;">ระบบสแกนผู้ส่งผลงาน<br>กรมวิทยาศาสตร์การแพทย์</div>
    <div style="font-size:0.78rem;color:#94a3b8;margin-top:4px;"><span id="userDisplay"></span></div>
  </div>

  <div class="row-label">เลือกโหมด</div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btnPresent"     onclick="setPresenterMode('present')">เช็คอินรอนำเสนอ</button>
    <button class="mode-btn"        id="btnCertificate" onclick="setPresenterMode('certificate')">รับเกียรติบัตร</button>
  </div>

  <div class="row-label">เลือกวิธีสแกน</div>
  <div class="scan-toggle">
    <button class="scan-btn active" id="btnScanner" onclick="setScanMode('scanner')">เครื่องยิงบาร์โค้ด</button>
    <button class="scan-btn"        id="btnCamera"  onclick="setScanMode('camera')">กล้องมือถือ</button>
  </div>

  <div id="cameraMode" style="display:none">
    <div id="reader-container"><div class="spinner"></div></div>
  </div>
  <div class="scanner-mode" id="scannerMode">
    <div class="scan-hint">เล็งเครื่องยิงบาร์โค้ดที่ QR Code แล้วกดปุ่มยิง</div>
    <input class="scan-input" id="scanInput" placeholder="รอรับรหัสจากเครื่องยิง..." readonly>
    <div class="scan-status-box" id="statusBox">พร้อมรับข้อมูลจากเครื่องยิงบาร์โค้ด</div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">หรือป้อนรหัสเอง</div>
    <div class="divider-line"></div>
  </div>
  <div class="manual-wrap">
    <input class="manual-input" id="manualInput" placeholder="เลขบัตรประชาชน / Passport"
      onkeydown="if(event.key==='Enter') submitManual()">
    <button class="manual-btn" onclick="submitManual()">ค้นหา</button>
  </div>

  <div class="counter">
    <span id="counterLabel">เช็คอินรอนำเสนอแล้ว</span>
    <strong id="count">—</strong>
    <span>ราย</span>
  </div>
  <div class="counter-sub" id="counterSub">กำลังโหลด...</div>

  <a class="btn-nav primary" href="dashboard.html" style="margin-top:16px;">ไปหน้า Dashboard ผู้ส่งผลงาน</a>
  <button class="btn-nav danger" onclick="doLogout()">ออกจากระบบ</button>

  <div class="status-bar">
    <div class="dot"></div>
    <span id="statusText">รอเครื่องยิงบาร์โค้ด</span>
  </div>
</div>

<script>
  const SB_URL  = "https://gvxytnjfyepqhbkmcjms.supabase.co";
  const SB_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2eHl0bmpmeWVwcWhia21jam1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MzE2NDAsImV4cCI6MjA5NTAwNzY0MH0.RAr_ehb4cxfNliDR0h5XcihUaP-0ltZTTGIAv2Fw1kk";

  if(sessionStorage.getItem('presenter_auth')!=='ok') window.location.href='login.html';
  document.getElementById('userDisplay').textContent=sessionStorage.getItem('presenter_user')||'';

  let isProcessing=false, modeCount=0, qrCode=null;
  let presenterMode='present', scanMode='scanner', scanBuffer='', scanTimer=null;

  window.addEventListener('load',()=>{ setScanMode('scanner'); loadCount(); });

  function setPresenterMode(mode){
    presenterMode=mode;
    document.getElementById('btnPresent').classList.toggle('active',mode==='present');
    document.getElementById('btnCertificate').classList.toggle('active',mode==='certificate');
    document.getElementById('counterLabel').textContent=mode==='present'?'เช็คอินรอนำเสนอแล้ว':'รับเกียรติบัตรแล้ว';
    loadCount();
  }

  function setScanMode(mode){
    scanMode=mode;
    document.getElementById('btnScanner').classList.toggle('active',mode==='scanner');
    document.getElementById('btnCamera').classList.toggle('active',mode==='camera');
    document.getElementById('cameraMode').style.display=mode==='camera'?'':'none';
    document.getElementById('scannerMode').style.display=mode==='scanner'?'':'none';
    if(mode==='camera') startCamera();
    else{ if(qrCode){qrCode.stop().catch(()=>{});qrCode=null;} setStatus('รอเครื่องยิงบาร์โค้ด'); }
  }

  function startCamera(){
    const c=document.getElementById('reader-container');
    c.innerHTML='<div id="reader"></div>';
    setStatus('กำลังเปิดกล้อง...');
    qrCode=new Html5Qrcode('reader');
    qrCode.start({facingMode:'environment'},{fps:10,qrbox:{width:220,height:220}},
      text=>{ if(!isProcessing){ if(scanMode==='camera'){try{qrCode.pause();}catch(e){}} onScanSuccess(text); } },
      ()=>{}
    ).catch(()=>{
      c.innerHTML=`<div><div class="err-msg">ไม่สามารถเปิดกล้องได้</div><button class="retry-btn" onclick="startCamera()">ลองใหม่</button></div>`;
    });
  }

  window.addEventListener('keydown',e=>{
    if(scanMode!=='scanner'||isProcessing) return;
    if(e.key==='Enter'){ if(scanBuffer.length>3){ onScanSuccess(scanBuffer); scanBuffer=''; } return; }
    if(e.key.length===1){ scanBuffer+=e.key; clearTimeout(scanTimer); scanTimer=setTimeout(()=>{scanBuffer='';},300); }
  });

  async function loadCount(){
    document.getElementById('count').textContent='—';
    document.getElementById('counterSub').textContent='กำลังโหลด...';
    try{
      const res=await fetch(`${SB_URL}/rest/v1/presenter_checkins?type=eq.${presenterMode}&select=id`,
        {headers:{'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON,'Prefer':'count=exact','Range':'0-0'}});
      const range=res.headers.get('Content-Range');
      let count=0;
      if(range){const m=range.match(/\/(\d+)/);if(m)count=parseInt(m[1]);}
      modeCount=count;
      document.getElementById('count').textContent=count.toLocaleString();
      document.getElementById('counterSub').textContent=presenterMode==='present'?'ราย (เช็คอินรอนำเสนอ)':'ราย (รับเกียรติบัตร)';
    }catch(e){
      document.getElementById('count').textContent='?';
      document.getElementById('counterSub').textContent='โหลดไม่สำเร็จ';
    }
  }

  function submitManual(){
    const v=document.getElementById('manualInput').value.trim();
    if(v) onScanSuccess(v);
  }

  function setStatus(t){ document.getElementById('statusText').textContent=t; }

  async function onScanSuccess(decodedText){
    if(isProcessing) return;
    isProcessing=true;
    setStatus('กำลังค้นหา...');
    if(scanMode==='scanner') document.getElementById('scanInput').value=decodedText;
    showModal('loading','กำลังดำเนินการ','กรุณารอสักครู่...','',null);
    try{
      const keyword=decodedText.trim();
      const searchRes=await sbFetch(`/rest/v1/participants?or=(id_card.eq.${encodeURIComponent(keyword)},passport.eq.${encodeURIComponent(keyword)})&select=id,prefix,first_name,last_name,participation_type,dept`,'GET');
      if(!searchRes.ok){showModal('error','ข้อผิดพลาด','ไม่สามารถค้นหาข้อมูลได้','',null);return;}
      const participants=await searchRes.json();
      if(!participants||participants.length===0){showModal('error','ไม่พบข้อมูล','ไม่พบข้อมูลในระบบ','',null);return;}

      const p=participants[0];
      const fullName=`${p.prefix||''} ${p.first_name||''} ${p.last_name||''}`.trim();

      if(!(p.participation_type||'').includes('ผู้ส่งผลงาน')){
        showModal('error','ไม่มีสิทธิ์','บุคคลนี้ไม่ใช่ผู้ส่งผลงาน',fullName,[
          {label:'ประเภท',val:p.participation_type||'-',style:'normal'}
        ]);
        return;
      }

      const checkRes=await sbFetch(`/rest/v1/presenter_checkins?participant_id=eq.${p.id}&type=eq.${presenterMode}&select=id,checkin_time`,'GET');
      const existing=await checkRes.json();
      if(existing&&existing.length>0){
        const t=new Date(existing[0].checkin_time).toLocaleTimeString('th-TH',{timeZone:'Asia/Bangkok'});
        const doneLabel=presenterMode==='present'?'เช็คอินรอนำเสนอแล้ว':'รับเกียรติบัตรแล้ว';
        showModal('warning',doneLabel,doneLabel+'ไปแล้ว',fullName,[
          {label:'เวลาที่บันทึก',val:t,style:'normal'},
          {label:'ประเภท',val:p.participation_type,style:'normal'}
        ]);
        return;
      }

      const insertRes=await sbFetch('/rest/v1/presenter_checkins','POST',{
        participant_id:p.id,
        type:presenterMode,
        checkin_time:new Date().toISOString(),
        scanned_by:sessionStorage.getItem('presenter_user')||'unknown'
      });

      if(insertRes.ok||insertRes.status===201){
        modeCount++;
        document.getElementById('count').textContent=modeCount.toLocaleString();
        const timeNow=new Date().toLocaleTimeString('th-TH',{timeZone:'Asia/Bangkok'});
        const successLabel=presenterMode==='present'?'เช็คอินสำเร็จ':'รับเกียรติบัตรสำเร็จ';
        const successTitle=presenterMode==='present'?'บันทึกเช็คอินรอนำเสนอแล้ว':'บันทึกการรับเกียรติบัตรแล้ว';
        showModal('success',successLabel,successTitle,fullName,[
          {label:'เวลา',val:timeNow,style:'normal'},
          {label:'ประเภท',val:p.participation_type,style:'normal'}
        ]);
        setStatus(successLabel);
      } else {
        showModal('error','เกิดข้อผิดพลาด','ไม่สามารถบันทึกได้','',null);
      }
    }catch(e){
      showModal('error','เชื่อมต่อไม่ได้','กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต','',null);
    }
  }

  function showModal(type,status,title,name,rows){
    document.getElementById('modalStatus').textContent=status;
    document.getElementById('modalStatus').className='modal-status '+type;
    document.getElementById('modalTitle').textContent=title;
    document.getElementById('modalName').textContent=name||'';
    document.getElementById('btnOk').className='btn-ok '+(type==='loading'?'loading':type);
    document.getElementById('btnOk').style.display=type==='loading'?'none':'block';
    const det=document.getElementById('modalDetail');
    if(rows&&rows.length>0){
      det.style.display='block';
      det.innerHTML=rows.map(r=>`<div class="detail-row"><span class="detail-label">${r.label}</span><span class="detail-val ${r.style==='done'?'done':r.style==='ok'?'ok':r.style==='warn'?'warn':''}">${r.val}</span></div>`).join('');
    } else det.style.display='none';
    document.getElementById('modalOverlay').classList.remove('hidden');
  }

  function closeModal(){
    document.getElementById('modalOverlay').classList.add('hidden');
    document.getElementById('manualInput').value='';
    document.getElementById('scanInput').value='';
    isProcessing=false;
    if(scanMode==='camera'){try{qrCode.resume();}catch(e){}}
    setStatus(scanMode==='scanner'?'รอเครื่องยิงบาร์โค้ด':'พร้อมสแกน');
  }

  function sbFetch(path,method,body){
    const opts={method,headers:{'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON,'Content-Type':'application/json','Prefer':'return=minimal'}};
    if(body) opts.body=JSON.stringify(body);
    return fetch(SB_URL+path,opts);
  }

  function doLogout(){
    sessionStorage.removeItem('presenter_auth');
    sessionStorage.removeItem('presenter_user');
    window.location.href='login.html';
  }
</script>
</body>
</html>
