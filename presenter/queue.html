<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart E-Queue — กรมวิทยาศาสตร์การแพทย์</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#eef2ff;font-family:'Sarabun',sans-serif;min-height:100vh;padding-bottom:40px;}

    /* Header */
    .header{background:white;padding:14px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,0.07);position:sticky;top:0;z-index:50;}
    .header-logos{display:flex;align-items:center;gap:8px;}
    .header-text{flex:1;}
    .header-title{font-size:1.1rem;font-weight:700;color:#1e293b;}
    .header-sub{font-size:0.75rem;color:#94a3b8;margin-top:1px;}
    .header-update{font-size:0.72rem;color:#94a3b8;text-align:right;}

    /* Content */
    .content{max-width:680px;margin:0 auto;padding:20px 16px;display:flex;flex-direction:column;gap:20px;}

    /* Section */
    .section{background:white;border-radius:20px;box-shadow:0 2px 16px rgba(0,0,0,0.07);overflow:hidden;}
    .section-head{padding:16px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:12px;}
    .section-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
    .section-icon.blue{background:#eff6ff;}
    .section-icon.amber{background:#fffbeb;}
    .section-info{flex:1;}
    .section-title{font-size:1rem;font-weight:700;color:#1e293b;}
    .section-sub{font-size:0.78rem;color:#94a3b8;margin-top:2px;}
    .section-badges{display:flex;gap:8px;align-items:center;}
    .badge-count{background:#f1f5f9;color:#475569;font-size:0.78rem;font-weight:600;padding:4px 12px;border-radius:20px;}
    .badge-step{background:#1e293b;color:white;font-size:0.78rem;font-weight:700;padding:4px 12px;border-radius:20px;}
    .badge-step.amber{background:#f59e0b;}

    /* Queue cards */
    .queue-list{padding:12px 16px;display:flex;flex-direction:column;gap:12px;}
    .empty{text-align:center;padding:32px 16px;color:#94a3b8;font-size:0.9rem;}

    .q-card{background:#f8fafc;border-radius:14px;padding:16px;}
    .q-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .q-num{background:#1e293b;color:white;font-size:0.8rem;font-weight:700;padding:4px 12px;border-radius:8px;letter-spacing:0.05em;}
    .q-time{font-size:0.78rem;color:#94a3b8;display:flex;align-items:center;gap:4px;}
    .q-name{font-size:1.5rem;font-weight:700;color:#0f172a;line-height:1.3;margin-bottom:12px;}
    .q-info{background:#eff6ff;border-radius:10px;padding:12px 14px;margin-bottom:10px;}
    .q-info-row{font-size:0.82rem;color:#475569;margin-bottom:4px;line-height:1.5;}
    .q-info-row:last-child{margin-bottom:0;}
    .q-info-row span{font-weight:600;color:#1e40af;}
    .q-status{display:flex;align-items:center;gap:8px;font-size:0.82rem;color:#3b82f6;font-weight:600;}
    .q-dot{width:8px;height:8px;border-radius:50%;background:#3b82f6;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

    .q-card.cert .q-num{background:#f59e0b;}
    .q-card.cert .q-info{background:#fffbeb;}
    .q-card.cert .q-info-row span{color:#b45309;}
    .q-card.cert .q-status{color:#f59e0b;}
    .q-card.cert .q-dot{background:#f59e0b;}
  </style>
</head>
<body>

<div class="header">
  <div class="header-logos">
    <img src="https://raw.githubusercontent.com/poundpop35-creator/search-participant/main/logo-%E0%B8%9B%E0%B8%A3%E0%B8%B0%E0%B8%8A%E0%B8%B8%E0%B8%A1%E0%B8%A7%E0%B8%B4%E0%B8%8A%E0%B8%B2%E0%B8%81%E0%B8%B2%E0%B8%A3-34-Final_0.png" style="height:36px;object-fit:contain;" alt="">
    <img src="https://raw.githubusercontent.com/poundpop35-creator/search-participant/main/logo-DMSc-MOPH%20(1)%20(2)_0.png" style="height:36px;object-fit:contain;" alt="">
  </div>
  <div class="header-text">
    <div class="header-title">Smart E-Queue</div>
    <div class="header-sub">ระบบเช็คอินและบริหารคิวอัจฉริยะสำหรับงาน...</div>
  </div>
  <div class="header-update" id="lastUpdate">-</div>
</div>

<div class="content">

  <!-- Step 1 -->
  <div class="section">
    <div class="section-head">
      <div class="section-icon blue">👤</div>
      <div class="section-info">
        <div class="section-title">คิวเช็คอินเข้างาน</div>
        <div class="section-sub">รอสแตนด์บายที่จุดนำเสนอ</div>
      </div>
      <div class="section-badges">
        <div class="badge-count" id="countPresent">0 คิว</div>
        <div class="badge-step">Step 1</div>
      </div>
    </div>
    <div class="queue-list" id="listPresent">
      <div class="empty">กำลังโหลด...</div>
    </div>
  </div>

  <!-- Step 2 -->
  <div class="section">
    <div class="section-head">
      <div class="section-icon amber">🏅</div>
      <div class="section-info">
        <div class="section-title">รอรับใบประกาศ</div>
        <div class="section-sub">นำเสนอเสร็จสิ้น</div>
      </div>
      <div class="section-badges">
        <div class="badge-count" id="countCert">0 คิว</div>
        <div class="badge-step amber">Step 2</div>
      </div>
    </div>
    <div class="queue-list" id="listCert">
      <div class="empty">ยังไม่มีคิวมารับใบประกาศครับ 🎖️</div>
    </div>
  </div>

</div>

<script>
  const SB_URL  = "https://gvxytnjfyepqhbkmcjms.supabase.co";
  const SB_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2eHl0bmpmeWVwcWhia21cam1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MzE2NDAsImV4cCI6MjA5NTAwNzY0MH0.RAr_ehb4cxfNliDR0h5XcihUaP-0ltZTTGIAv2Fw1kk";
  const H = {'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON};

  function fmt(iso){
    return new Date(iso).toLocaleTimeString('th-TH',{timeZone:'Asia/Bangkok',hour:'2-digit',minute:'2-digit'});
  }

  function renderCard(p, idx, type){
    const isCert = type==='certificate';
    const qNum = (isCert?'C':'P')+'-'+(idx+1);
    return`<div class="q-card${isCert?' cert':''}">
      <div class="q-card-top">
        <div class="q-num">${qNum}</div>
        <div class="q-time">🕐 ${fmt(p.checkin_time)} น.</div>
      </div>
      <div class="q-name">${p.prefix||''} ${p.first_name||''} ${p.last_name||''}</div>
      <div class="q-info">
        <div class="q-info-row"><span>หน่วยงาน:</span> ${p.dept||'-'}</div>
        <div class="q-info-row"><span>ประเภท:</span> ${p.participation_type||'-'}</div>
      </div>
      <div class="q-status">
        <div class="q-dot"></div>
        ${isCert?'รอรับใบประกาศ':'รอ ณ จุดพักคอยก่อนเวลา 15 นาที'}
      </div>
    </div>`;
  }

  async function load(){
    try{
      const [participants, checkins] = await Promise.all([
        fetch(SB_URL+'/rest/v1/participants?select=id,prefix,first_name,last_name,dept,participation_type',{headers:{...H,'Range':'0-9999'}}).then(r=>r.json()),
        fetch(SB_URL+'/rest/v1/presenter_checkins?select=participant_id,type,checkin_time&order=checkin_time.asc',{headers:{...H,'Range':'0-9999'}}).then(r=>r.json())
      ]);

      if(!Array.isArray(participants)||!Array.isArray(checkins)) return;

      const pMap = {};
      participants.forEach(p=>{ pMap[p.id]=p; });

      const presentList = checkins.filter(c=>c.type==='present').map(c=>({...pMap[c.participant_id],...c})).filter(x=>x.first_name);
      const certList    = checkins.filter(c=>c.type==='certificate').map(c=>({...pMap[c.participant_id],...c})).filter(x=>x.first_name);

      document.getElementById('countPresent').textContent = presentList.length+' คิว';
      document.getElementById('countCert').textContent    = certList.length+' คิว';

      document.getElementById('listPresent').innerHTML = presentList.length
        ? presentList.map((p,i)=>renderCard(p,i,'present')).join('')
        : '<div class="empty">ยังไม่มีคิวเช็คอินครับ 👤</div>';

      document.getElementById('listCert').innerHTML = certList.length
        ? certList.map((p,i)=>renderCard(p,i,'certificate')).join('')
        : '<div class="empty">ยังไม่มีคิวมารับใบประกาศครับ 🎖️</div>';

      document.getElementById('lastUpdate').textContent = 'อัปเดต '+new Date().toLocaleTimeString('th-TH',{timeZone:'Asia/Bangkok',hour:'2-digit',minute:'2-digit'});
    }catch(e){console.error(e);}
  }

  // Demo data for testing UI
  const DEMO = {
    present: [
      {prefix:'นาย',first_name:'มณฑล',last_name:'เลิศคณาวนิชกุล',dept:'สถาบันวิจัยวิทยาศาสตร์สาธารณสุข',participation_type:'ผู้ส่งผลงาน',checkin_time:new Date(Date.now()-25*60000).toISOString()},
      {prefix:'นางสาว',first_name:'สุภาพร',last_name:'ทองดี',dept:'สำนักคุณภาพและความปลอดภัยอาหาร',participation_type:'ผู้ส่งผลงาน',checkin_time:new Date(Date.now()-18*60000).toISOString()},
      {prefix:'นาง',first_name:'วรรณา',last_name:'พิมพ์ใจ',dept:'สถาบันชีววัตถุ',participation_type:'ผู้ส่งผลงาน',checkin_time:new Date(Date.now()-10*60000).toISOString()},
    ],
    certificate: [
      {prefix:'ดร.',first_name:'ประสิทธิ์',last_name:'ศรีสมบูรณ์',dept:'กองทดสอบความชำนาญ',participation_type:'ผู้ส่งผลงาน',checkin_time:new Date(Date.now()-60*60000).toISOString()},
    ]
  };

  function renderDemo(){
    document.getElementById('countPresent').textContent = DEMO.present.length+' คิว';
    document.getElementById('countCert').textContent    = DEMO.certificate.length+' คิว';
    document.getElementById('listPresent').innerHTML = DEMO.present.map((p,i)=>renderCard(p,i,'present')).join('');
    document.getElementById('listCert').innerHTML    = DEMO.certificate.map((p,i)=>renderCard(p,i,'certificate')).join('');
    document.getElementById('lastUpdate').textContent = '⚠️ โหมด Demo';
  }

  // Toggle: set useDemoData=true to show demo, false to use real data
  const useDemoData = false;
  if(useDemoData){ renderDemo(); } else { load(); setInterval(load, 30000); }
</script>
</body>
</html>
