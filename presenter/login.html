<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — ระบบผู้ส่งผลงาน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:linear-gradient(rgba(232,240,254,0.60),rgba(232,240,254,0.60)),url('https://raw.githubusercontent.com/poundpop35-creator/search-participant/main/DNA.png') center/cover fixed;font-family:'Sarabun',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .box{background:white;border-radius:24px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
    .logo{text-align:center;margin-bottom:28px;}
    .logo h1{font-size:1.1rem;font-weight:700;color:#0d2b6b;margin-top:12px;line-height:1.5;}
    .logo p{font-size:0.8rem;color:#94a3b8;margin-top:4px;}
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:0.82rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px;}
    .field input{width:100%;padding:12px 16px;border-radius:12px;border:2px solid #e2e8f0;font-family:'Sarabun',sans-serif;font-size:1rem;color:#1e293b;outline:none;transition:border .15s;}
    .field input:focus{border-color:#1a4eb8;}
    .btn-login{width:100%;padding:14px;border-radius:12px;border:none;background:#0d2b6b;color:white;font-family:'Sarabun',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px;}
    .btn-login:hover{opacity:0.88;}
    .err{color:#dc2626;font-size:0.85rem;text-align:center;margin-top:10px;min-height:20px;}
  </style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;">
      <img src="https://raw.githubusercontent.com/poundpop35-creator/search-participant/main/logo-%E0%B8%9B%E0%B8%A3%E0%B8%B0%E0%B8%8A%E0%B8%B8%E0%B8%A1%E0%B8%A7%E0%B8%B4%E0%B8%8A%E0%B8%B2%E0%B8%81%E0%B8%B2%E0%B8%A3-34-Final_0.png" style="height:48px;object-fit:contain;" alt="conference">
      <img src="https://raw.githubusercontent.com/poundpop35-creator/search-participant/main/logo-DMSc-MOPH%20(1)%20(2)_0.png" style="height:48px;object-fit:contain;" alt="dmsc">
    </div>
    <h1>ระบบสแกนผู้ส่งผลงาน<br>กรมวิทยาศาสตร์การแพทย์</h1>
    <p>สำหรับเจ้าหน้าที่เท่านั้น</p>
  </div>
  <div class="field">
    <label>ชื่อผู้ใช้</label>
    <input type="text" id="username" placeholder="pass001" autocomplete="username"
      onkeydown="if(event.key==='Enter')document.getElementById('password').focus()">
  </div>
  <div class="field">
    <label>รหัสผ่าน</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <button class="btn-login" onclick="doLogin()">เข้าสู่ระบบ</button>
  <div class="err" id="errMsg"></div>
</div>
<script>
  if(sessionStorage.getItem('presenter_auth')==='ok') window.location.href='index.html';
  function doLogin(){
    const u=document.getElementById('username').value.trim().toLowerCase();
    const p=document.getElementById('password').value;
    const err=document.getElementById('errMsg');
    if(!u||!p){err.textContent='กรุณากรอกชื่อผู้ใช้และรหัสผ่าน';return;}
    if(u==='pass001'&&p==='pass001'){
      sessionStorage.setItem('presenter_auth','ok');
      sessionStorage.setItem('presenter_user',u);
      window.location.href='index.html';
    } else {
      err.textContent='ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
      document.getElementById('password').value='';
      document.getElementById('password').focus();
    }
  }
</script>
</body>
</html>
