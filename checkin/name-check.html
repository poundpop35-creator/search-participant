<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>เช็กรายชื่อ</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Sarabun',sans-serif;background:#f1f5f9;padding:20px;font-size:15px;}
  h1{font-size:1.2rem;color:#1e3a5f;margin-bottom:16px;}
  .card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px #0001;margin-bottom:16px;}
  textarea{width:100%;height:220px;border:1px solid #cbd5e1;border-radius:8px;padding:10px;font-family:'Sarabun',sans-serif;font-size:14px;resize:vertical;}
  button{background:#1e3a5f;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:15px;cursor:pointer;margin-top:10px;}
  button:hover{background:#2d5086;}
  .hint{font-size:0.8rem;color:#94a3b8;margin-top:6px;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th{background:#1e3a5f;color:#fff;padding:8px 10px;text-align:left;}
  td{padding:8px 10px;border-bottom:1px solid #e2e8f0;}
  tr:hover td{background:#f8fafc;}
  .found{color:#16a34a;font-weight:700;}
  .notfound{color:#dc2626;}
  .tag-in{background:#dbeafe;color:#1e40af;border-radius:4px;padding:2px 6px;font-size:12px;}
  .tag-out{background:#dcfce7;color:#166534;border-radius:4px;padding:2px 6px;font-size:12px;}
  #summary{font-size:0.9rem;color:#475569;margin-bottom:10px;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<h1>🔍 เช็กรายชื่อในระบบ</h1>

<div class="card">
  <div style="font-weight:600;margin-bottom:8px;">วางรายชื่อที่ต้องการเช็ก (1 ชื่อ ต่อ 1 บรรทัด)</div>
  <textarea id="nameInput" placeholder="ตัวอย่าง:
ไปรยา คำภา
กัมปนาท ทุมพลเจริญ
สิรินาค ภาวรรณ
..."></textarea>
  <div class="hint">ใส่ได้ทั้ง &quot;ชื่อ นามสกุล&quot; หรือแค่ &quot;นามสกุล&quot; อย่างเดียวก็ได้ ไม่ต้องใส่คำนำหน้า</div>
  <button onclick="checkNames()">ตรวจสอบ</button>
</div>

<div id="results" style="display:none;">
  <div class="card">
    <div id="summary"></div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>ชื่อที่ค้นหา</th>
          <th>ผล</th>
          <th>ชื่อในระบบ</th>
          <th>หน่วยงาน</th>
          <th>ประเภท</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
const SB_URL = "https://gvxytnjfyepqhbkmcjms.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2eHl0bmpmeWVwcWhia21jam1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MzE2NDAsImV4cCI6MjA5NTAwNzY0MH0.RAr_ehb4cxfNliDR0h5XcihUaP-0ltZTTGIAv2Fw1kk";

let allParticipants = [];

async function loadAll() {
  const res = await fetch(`${SB_URL}/rest/v1/participants?select=prefix,first_name,last_name,dept,ext_dept,internal_external&limit=5000`, {
    headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY }
  });
  allParticipants = await res.json();
}

function normalize(s) {
  return (s || '').trim().replace(/\s+/g, ' ');
}

function search(query) {
  const q = normalize(query).replace(/^(นาย|นาง|นางสาว)\s*/, '');
  const parts = q.split(' ').filter(Boolean);
  if (!parts.length) return { exact: [], fuzzy: [] };

  const exact = allParticipants.filter(p => {
    const fn = normalize(p.first_name);
    const ln = normalize(p.last_name);
    if (parts.length === 1) return fn === parts[0] || ln === parts[0];
    return fn === parts[0] && ln === parts[1];
  });

  if (exact.length) return { exact, fuzzy: [] };

  // fuzzy: partial match on either part
  const fuzzy = allParticipants.filter(p => {
    const fn = normalize(p.first_name);
    const ln = normalize(p.last_name);
    return parts.every(pt => fn.includes(pt) || ln.includes(pt));
  });

  return { exact: [], fuzzy };
}

async function checkNames() {
  const raw = document.getElementById('nameInput').value;
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  if (!lines.length) return;

  document.getElementById('results').style.display = 'none';
  const btn = document.querySelector('button');
  btn.textContent = 'กำลังโหลด...';
  btn.disabled = true;

  if (!allParticipants.length) await loadAll();

  btn.textContent = 'ตรวจสอบ';
  btn.disabled = false;

  let found = 0;
  const rows = lines.map((line, i) => {
    const { exact, fuzzy } = search(line);
    if (exact.length) found++;
    return { line, exact, fuzzy };
  });

  document.getElementById('summary').innerHTML =
    `พบตรง <strong class="found">${found}</strong> จาก ${lines.length} ชื่อ`;

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = rows.map(({ line, exact, fuzzy }, i) => {
    const renderRow = (p, mi, label, labelStyle) => {
      const isIn = (p.internal_external || '').includes('ภายใน');
      const dept = isIn ? (p.dept || '-') : (p.ext_dept || p.dept || '-');
      const tag = isIn ? '<span class="tag-in">ภายใน</span>' : '<span class="tag-out">ภายนอก</span>';
      return `<tr>
        <td>${mi === 0 ? i+1 : ''}</td>
        <td>${mi === 0 ? line : ''}</td>
        <td style="${labelStyle}">${label}</td>
        <td>${p.prefix || ''}${p.first_name} ${p.last_name}</td>
        <td>${dept}</td>
        <td>${tag}</td>
      </tr>`;
    };
    if (exact.length) {
      return exact.map((p, mi) => renderRow(p, mi, '✓ พบ', 'color:#16a34a;font-weight:700')).join('');
    }
    if (fuzzy.length) {
      return fuzzy.map((p, mi) => renderRow(p, mi, '~ ใกล้เคียง', 'color:#d97706;font-weight:600')).join('');
    }
    return `<tr>
      <td>${i+1}</td><td>${line}</td>
      <td class="notfound">ไม่พบ</td>
      <td>-</td><td>-</td><td>-</td>
    </tr>`;
  }).join('');

  document.getElementById('results').style.display = 'block';
}
</script>
</body>
</html>
