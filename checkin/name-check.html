<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>เช็กรายชื่อ</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Sarabun',sans-serif;background:#f1f5f9;padding:20px;font-size:15px;}
  h1{font-size:1.2rem;color:#1e3a5f;margin-bottom:16px;}
  .card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px #0001;margin-bottom:16px;}
  textarea{width:100%;height:220px;border:1px solid #cbd5e1;border-radius:8px;padding:10px;font-family:'Sarabun',sans-serif;font-size:14px;resize:vertical;}
  button{background:#1e3a5f;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:15px;cursor:pointer;margin-top:10px;}
  button:hover{background:#2d5086;}
  button:disabled{background:#94a3b8;cursor:not-allowed;}
  .hint{font-size:0.8rem;color:#94a3b8;margin-top:6px;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th{background:#1e3a5f;color:#fff;padding:8px 10px;text-align:left;}
  td{padding:8px 10px;border-bottom:1px solid #e2e8f0;}
  tr:hover td{background:#f8fafc;}
  .found{color:#16a34a;font-weight:700;}
  .notfound{color:#dc2626;}
  .approx{color:#d97706;font-weight:600;}
  .tag-in{background:#dbeafe;color:#1e40af;border-radius:4px;padding:2px 6px;font-size:12px;}
  .tag-out{background:#dcfce7;color:#166534;border-radius:4px;padding:2px 6px;font-size:12px;}
  #summary{font-size:0.9rem;color:#475569;margin-bottom:10px;}
  #statusMsg{font-size:0.82rem;color:#64748b;margin-top:6px;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<h1>🔍 เช็กรายชื่อในระบบ</h1>

<div class="card">
  <div style="font-weight:600;margin-bottom:8px;">วางรายชื่อที่ต้องการเช็ก (1 ชื่อ ต่อ 1 บรรทัด)</div>
  <textarea id="nameInput" placeholder="ตัวอย่าง:
ไปรยา คำภา
กัมปนาท ทุมพลเจริญ
สิรินาค ภาวรรณ
..."></textarea>
  <div class="hint">ใส่ได้ทั้ง &quot;ชื่อ นามสกุล&quot; หรือแค่ &quot;ชื่อ&quot; หรือ &quot;นามสกุล&quot; อย่างเดียวก็ได้ ไม่ต้องใส่คำนำหน้า</div>
  <button id="checkBtn" onclick="checkNames()">ตรวจสอบ</button>
  <div id="statusMsg"></div>
</div>

<div id="results" style="display:none;">
  <div class="card">
    <div id="summary"></div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>ชื่อที่ค้นหา</th>
          <th>ผล</th>
          <th>ชื่อในระบบ</th>
          <th>หน่วยงาน</th>
          <th>ประเภท</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
const SB_URL = localStorage.getItem('dmsc_sb_url') || "https://gvxytnjfyepqhbkmcjms.supabase.co";
const SB_KEY = localStorage.getItem('dmsc_sb_key') || localStorage.getItem('dmsc_sb_anon') || "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2eHl0bmpmeWVwcWhia21qbXMiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc3OTQzMTY0MCwiZXhwIjoyMDk1MDA3NjQwfQ.RAr_ehb4cxfNliDR0h5XcihUaP-0ltZTTGIAv2Fw1kk";
const H = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };

let activeYear = '2569';
let allParticipants = null;

function stripPrefix(s) {
  return (s || '').trim().replace(/^(นาย|นางสาว|นาง)\s*/, '').replace(/\s+/g, ' ').trim();
}

async function ensureData() {
  if (allParticipants !== null) return;

  // fetch active year from app_settings
  try {
    const yr = await fetch(`${SB_URL}/rest/v1/app_settings?key=eq.event_year&select=value`, { headers: H });
    const yd = await yr.json();
    if (Array.isArray(yd) && yd.length && yd[0].value) activeYear = yd[0].value;
  } catch(e) {}

  const enc = encodeURIComponent(activeYear);
  let data = [], offset = 0;
  while (true) {
    const r = await fetch(
      `${SB_URL}/rest/v1/participants?event_year=eq.${enc}&select=prefix,first_name,last_name,dept,ext_dept,internal_external&order=last_name.asc&limit=1000&offset=${offset}`,
      { headers: H }
    );
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (!Array.isArray(d) || !d.length) break;
    data = data.concat(d);
    if (d.length < 1000) break;
    offset += 1000;
  }
  allParticipants = data;
}

function searchInData(query) {
  const ql = query.toLowerCase();
  return allParticipants.filter(p =>
    (p.first_name || '').toLowerCase().includes(ql) ||
    (p.last_name || '').toLowerCase().includes(ql)
  );
}

function searchByParts(firstName, lastName) {
  if (firstName && lastName) {
    const fl = firstName.toLowerCase(), ll = lastName.toLowerCase();
    return allParticipants.filter(p =>
      (p.first_name || '').toLowerCase().includes(fl) &&
      (p.last_name || '').toLowerCase().includes(ll)
    );
  }
  const term = (firstName || lastName).toLowerCase();
  return allParticipants.filter(p =>
    (p.first_name || '').toLowerCase().includes(term) ||
    (p.last_name || '').toLowerCase().includes(term)
  );
}

async function checkNames() {
  const raw = document.getElementById('nameInput').value;
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  if (!lines.length) return;

  document.getElementById('results').style.display = 'none';
  const btn = document.getElementById('checkBtn');
  const status = document.getElementById('statusMsg');
  btn.textContent = 'กำลังโหลดข้อมูล...';
  btn.disabled = true;
  status.textContent = '';

  try {
    if (allParticipants === null) {
      status.textContent = 'กำลังดึงข้อมูลจากระบบ...';
      await ensureData();
      status.textContent = `โหลดข้อมูลสำเร็จ ${allParticipants.length.toLocaleString()} คน (ปี ${activeYear})`;
    }

    const rows = [];
    for (const line of lines) {
      const q = stripPrefix(line);
      const parts = q.split(' ').filter(Boolean);
      const fn = parts[0] || '';
      const ln = parts.length > 1 ? parts.slice(1).join(' ') : '';

      // Try full-name match (firstName+lastName) first, then full-string match
      let exact = searchByParts(fn, ln);
      // If no result with split, try the whole stripped string as a single query
      if (!exact.length) exact = searchInData(q);
      rows.push({ line, results: exact });
    }

    btn.textContent = 'ตรวจสอบ';
    btn.disabled = false;

    const found = rows.filter(r => r.results.length).length;
    document.getElementById('summary').innerHTML =
      `พบ <strong class="found">${found}</strong> จาก ${lines.length} ชื่อ`;

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = rows.map(({ line, results }, i) => {
      const renderRow = (p, mi) => {
        const isIn = (p.internal_external || '').includes('ภายใน');
        const dept = isIn ? (p.dept || '-') : (p.ext_dept || p.dept || '-');
        const tag = isIn ? '<span class="tag-in">ภายใน</span>' : '<span class="tag-out">ภายนอก</span>';
        return `<tr>
          <td>${mi === 0 ? i+1 : ''}</td>
          <td>${mi === 0 ? line : ''}</td>
          <td class="found">✓ พบ</td>
          <td>${p.prefix || ''}${p.first_name} ${p.last_name}</td>
          <td>${dept}</td>
          <td>${tag}</td>
        </tr>`;
      };
      if (results.length) {
        return results.map((p, mi) => renderRow(p, mi)).join('');
      }
      return `<tr>
        <td>${i+1}</td><td>${line}</td>
        <td class="notfound">ไม่พบ</td>
        <td>-</td><td>-</td><td>-</td>
      </tr>`;
    }).join('');

    document.getElementById('results').style.display = 'block';
  } catch(e) {
    btn.textContent = 'ตรวจสอบ';
    btn.disabled = false;
    status.textContent = '❌ โหลดข้อมูลไม่ได้: ' + e.message;
  }
}
</script>
</body>
</html>
