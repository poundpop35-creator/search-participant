<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสแกน QR Code เช็คอิน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #f0f4f8; font-family: 'Sarabun', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .scanner-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        #reader { border-radius: 12px; overflow: hidden; border: 2px solid #e2e8f0; margin-bottom: 20px; }
        .result-box { margin-top: 20px; padding: 20px; border-radius: 12px; color: white; display: none; animation: fadeIn 0.3s ease-in-out; }
        .success { background-color: #198754; }
        .warning { background-color: #ffc107; color: #000; }
        .error { background-color: #dc3545; }
        .info { background-color: #0dcaf0; color: #000; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="scanner-card">
    <h3 class="mb-4 text-primary fw-bold">📸 สแกนเช็คอินหน้างาน</h3>
    
    <select id="daySelector" class="form-select mb-4" style="font-size: 1.1rem; padding: 10px;">
        <option value="1">📅 เช็คอินงานวันที่ 1</option>
        <option value="2">📅 เช็คอินงานวันที่ 2</option>
        <option value="3">📅 เช็คอินงานวันที่ 3</option>
    </select>

    <div id="reader"></div>

    <div id="resultBox" class="result-box">
        <h4 id="resultMsg" class="fw-bold mb-2"></h4>
        <h3 id="resultName" class="fw-bold mb-1"></h3>
        <p id="resultGift" class="mb-0"></p>
    </div>
</div>

<script>
    let isProcessing = false;
    let html5QrcodeScanner;

    window.onload = () => {
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    };

    function onScanSuccess(decodedText) {
        if (isProcessing) return;
        isProcessing = true;
        
        html5QrcodeScanner.pause(true);
        showResult('info', '⏳ กำลังบันทึกข้อมูล...', '', '');

        const daySelected = document.getElementById('daySelector').value;

        // ⚡ ลิงก์ API สำหรับส่งข้อมูลไปบันทึก
        const API_URL = "https://script.google.com/macros/s/AKfycbwJ1ETvPV4M1Dhxr7ZfWka1j0hPn5L-i4zoY9MvIyjxpmaT0pmnCTD70wzpK4mKBM3v/exec";

        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ scannedId: decodedText, daySelected: daySelected })
        })
        .then(response => response.json())
        .then(data => {
            showResult(data.status, data.msg, data.name, data.gift);
            resumeScanner();
        })
        .catch(err => {
            showResult('error', '❌ ระบบขัดข้อง หรือเน็ตหลุด', '', '');
            resumeScanner();
        });
    }

    function onScanFailure(error) {
        // ปล่อยผ่าน
    }

    function showResult(type, msg, name, gift) {
        const box = document.getElementById('resultBox');
        box.className = `result-box ${type}`;
        box.style.display = 'block';
        document.getElementById('resultMsg').innerText = msg;
        document.getElementById('resultName').innerText = name || '';
        document.getElementById('resultGift').innerText = gift ? `🎁 ${gift}` : '';
    }

    function resumeScanner() {
        setTimeout(() => {
            document.getElementById('resultBox').style.display = 'none';
            isProcessing = false;
            html5QrcodeScanner.resume();
        }, 2500); 
    }
</script>

</body>
</html>
