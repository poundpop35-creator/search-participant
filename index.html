<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ระบบค้นหารายชื่อผู้เข้าร่วมงาน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
      body { padding: 20px; background-color: #f0f4f8; font-family: 'Sarabun', sans-serif; }
      .search-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
      .table-card { margin-top: 20px; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
      th { background-color: #f8f9fa !important; white-space: nowrap; font-size: 0.9rem; }
      .summary-box { padding: 12px 5px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 10px; font-size: 0.82rem; min-height: 60px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
      .dropdown-menu { max-height: 300px; overflow-y: auto; width: 100%; }
      .badge-item { background-color: #6c757d; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; display: inline-block; }
      .qr-img { width: 100px; height: 100px; object-fit: contain; border: 1px solid #dee2e6; padding: 2px; background: #fff; cursor: pointer; transition: transform 0.2s; }
      .qr-img:hover { transform: scale(1.05); border-color: #0d6efd; }
      .loading-overlay { text-align: center; padding: 50px; }
      .btn-download { font-size: 0.7rem; padding: 2px 8px; margin-top: 5px; border-radius: 20px; }
      .col-pos { color: #0d6efd; font-weight: bold; }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="search-card">
        <h3 class="mb-4 text-primary" style="font-weight: bold;">🔍 ระบบค้นหารายชื่อผู้เข้าร่วมงาน</h3>
        
        <div class="row g-2 mb-4" id="summaryCounters">
            <div class="col-12 loading-overlay">
              <div class="spinner-border text-primary" role="status"></div>
              <div class="mt-2 text-muted">กำลังโหลดข้อมูลจากฐานข้อมูล...</div>
            </div>
        </div>

        <div class="row g-3">
          <div class="col-md-2">
            <label class="form-label text-muted fw-bold small">ชื่อ-นามสกุล</label>
            <input type="text" id="nameSearch" class="form-control" placeholder="พิมพ์ชื่อ..." onkeyup="filterData()">
          </div>
          <div class="col-md-2">
            <label class="form-label text-muted fw-bold small">ประเภทบุคคล</label>
            <div id="inOutFilterContainer"></div>
          </div>
          <div class="col-md-2">
            <label class="form-label text-muted fw-bold small">เลือกหน่วยงาน (กลุ่ม)</label>
            <div id="deptFilterContainer"></div>
          </div>
          <div class="col-md-2">
            <label class="form-label text-muted fw-bold small">พิมพ์ชื่อหน่วยงาน</label>
            <input type="text" id="deptSearch" class="form-control" placeholder="ค้นหาหน่วยงาน..." onkeyup="filterData()">
          </div>
          <div class="col-md-2">
            <label class="form-label text-muted fw-bold small">จังหวัด</label>
            <div id="provinceFilterContainer"></div>
          </div>
          <div class="col-md-2">
            <label class="form-label text-muted fw-bold small">ประเภทผู้เข้าร่วม</label>
            <div id="typeFilterContainer"></div>
          </div>
        </div>
      </div>

      <div class="table-card" id="tableCard" style="display: none;"> 
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th>ชื่อ-นามสกุล</th>
                <th>ตำแหน่ง</th>
                <th>ประเภทบุคคล</th>
                <th>สังกัด/หน่วยงาน</th>
                <th>สถานะ</th>
                <th>สิ่งที่ได้รับ</th>
                <th class="text-center">QR Code</th>
                <th>จังหวัด</th>
              </tr>
            </thead>
            <tbody id="dataTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      let rawData = [];

      window.onload = async function() {
        const API_URL = "https://script.google.com/macros/s/AKfycbwJ1ETvPV4M1Dhxr7ZfWka1j0hPn5L-i4zoY9MvIyjxpmaT0pmnCTD70wzpK4mKBM3v/exec"; 

        try {
          const response = await fetch(API_URL);
          const data = await response.json();

          if (data.error) {
            document.getElementById('summaryCounters').innerHTML = `<div class="alert alert-danger w-100">Error: ${data.error}</div>`;
            return;
          }

          rawData = data;
          setupDropdowns(rawData);
          updateCounters(rawData);
        } catch (err) {
          document.getElementById('summaryCounters').innerHTML = `<div class="alert alert-danger w-100">การเชื่อมต่อล้มเหลว (${err.message})</div>`;
        }
      };

      function updateCounters(data) {
        const selectedTypes = Array.from(document.querySelectorAll('.type-cb:checked')).map(cb => cb.value);
        const totalRows = data.length;
        
        let cExec = 0, cKam = 0, cStaff = 0, cSub = 0, cPart = 0;

        if (selectedTypes.length > 0) {
            data.forEach(item => {
              let ft = item.filterType || '';
              let ftLower = ft.toLowerCase();
              let roles = [];
              
              if (ft.includes('ผู้บริหาร')) roles.push('ผู้บริหาร');
              if (ft.includes('กรรมการ')) roles.push('กรรมการ');
              if (ft.includes('คณะทำงาน') || ftLower.includes('staff')) roles.push('คณะทำงาน');
              if (ft.includes('ผู้ส่งผลงาน')) roles.push('ผู้ส่งผลงาน');
              
              let targetBox = 'เข้าร่วม(บุคคลธรรมดา)'; 
              
              if (roles.length > 0) {
                  let baseRole = null;
                  if (selectedTypes.length === 1 && roles.includes(selectedTypes[0])) {
                      baseRole = selectedTypes[0];
                  }
                  
                  const priorityList = ['ผู้บริหาร', 'กรรมการ', 'คณะทำงาน', 'ผู้ส่งผลงาน'];
                  let foundOtherRole = false;
                  
                  for (let p of priorityList) {
                      if (roles.includes(p) && p !== baseRole) {
                          targetBox = p;
                          foundOtherRole = true;
                          break;
                      }
                  }
                  
                  if (!foundOtherRole) {
                      targetBox = baseRole || roles[0];
                  }
              }

              if (targetBox === 'ผู้บริหาร') cExec++;
              else if (targetBox === 'กรรมการ') cKam++;
              else if (targetBox === 'คณะทำงาน') cStaff++;
              else if (targetBox === 'ผู้ส่งผลงาน') cSub++;
              else cPart++;
            });
        }

        document.getElementById('summaryCounters').innerHTML = `
          <div class="col-md-2 col-sm-4"><div class="summary-box bg-secondary text-white"><span>👥 ทั้งหมด</span><span>${totalRows}</span></div></div>
          <div class="col-md-2 col-sm-4"><div class="summary-box bg-primary text-white"><span>👔 ผู้บริหาร</span><span>${cExec}</span></div></div>
          <div class="col-md-2 col-sm-4"><div class="summary-box bg-danger text-white"><span>⭐ กรรมการ</span><span>${cKam}</span></div></div>
          <div class="col-md-2 col-sm-4"><div class="summary-box bg-warning text-dark"><span>📋 คณะทำงาน</span><span>${cStaff}</span></div></div>
          <div class="col-md-2 col-sm-4"><div class="summary-box bg-info text-white"><span>📑 ส่งผลงาน</span><span>${cSub}</span></div></div>
          <div class="col-md-2 col-sm-4"><div class="summary-box bg-success text-white"><span>✅ เข้าร่วมงาน</span><span>${cPart}</span></div></div>
        `;
      }

      function filterData() {
        const nameVal = document.getElementById('nameSearch').value.toLowerCase().trim();
        const deptTextVal = document.getElementById('deptSearch').value.toLowerCase().trim();
        
        const selectedInOuts = Array.from(document.querySelectorAll('.inout-cb:checked')).map(cb => cb.value);
        const selectedDepts = Array.from(document.querySelectorAll('.dept-cb:checked')).map(cb => cb.value);
        const selectedProvs = Array.from(document.querySelectorAll('.prov-cb:checked')).map(cb => cb.value);
        const selectedTypes = Array.from(document.querySelectorAll('.type-cb:checked')).map(cb => cb.value);

        updateBtnText('inOutFilterContainer', selectedInOuts, '-- ทั้งหมด --');
        updateBtnText('deptFilterContainer', selectedDepts, '-- ทั้งหมด --');
        updateBtnText('provinceFilterContainer', selectedProvs, '-- ทั้งหมด --');
        updateBtnText('typeFilterContainer', selectedTypes, '-- ทั้งหมด --');

        const isFiltering = nameVal.length > 0 || deptTextVal.length > 0 || selectedInOuts.length > 0 || selectedDepts.length > 0 || selectedProvs.length > 0 || selectedTypes.length > 0;

        if (isFiltering) {
            const filtered = rawData.filter(item => {
              const fullName = (item.firstName + item.lastName).toLowerCase();
              const matchName = fullName.includes(nameVal);
              const matchInOut = selectedInOuts.length === 0 || selectedInOuts.includes(item.internalExtFilter);
              const matchProv = selectedProvs.length === 0 || selectedProvs.includes(item.filterProvince);
              
              const matchDeptDropdown = selectedDepts.length === 0 || selectedDepts.includes(item.filterDept);
              const combinedDeptForSearch = ((item.externalDept && item.externalDept !== '-') ? item.externalDept : item.filterDept).toLowerCase();
              const matchDeptText = combinedDeptForSearch.includes(deptTextVal);
              
              let matchType = selectedTypes.length === 0;
              if (!matchType) {
                if (selectedTypes.includes('เข้าร่วม(บุคคลธรรมดา)')) {
                    const isNormal = !item.filterType.includes('ผู้บริหาร') && !item.filterType.includes('กรรมการ') && !item.filterType.includes('คณะทำงาน') && !item.filterType.toLowerCase().includes('staff') && !item.filterType.includes('ผู้ส่งผลงาน');
                    if (isNormal) matchType = true;
                }
                
                if (selectedTypes.some(type => type !== 'เข้าร่วม(บุคคลธรรมดา)' && (item.filterType.includes(type) || (type === 'คณะทำงาน' && item.filterType.toLowerCase().includes('staff'))))) {
                    matchType = true;
                }
              }
              
              return matchName && matchInOut && matchDeptDropdown && matchDeptText && matchProv && matchType;
            });
            displayData(filtered);
            updateCounters(filtered); 
        } else {
            document.getElementById('tableCard').style.display = 'none';
            updateCounters(rawData); 
        }
      }

      function displayData(data) {
        const tbody = document.getElementById('dataTableBody');
        const tableCard = document.getElementById('tableCard');

        if(data.length > 0) {
            tableCard.style.display = 'block';
            tbody.innerHTML = data.map(item => {
              let badgeClass = item.participationType.includes('กรรมการ') ? 'bg-danger' : (item.participationType.includes('คณะทำงาน') ? 'bg-warning text-dark' : 'bg-success');
              let combinedDept = (item.externalDept && item.externalDept !== '-') ? item.externalDept : item.filterDept;
              
              let btnHtml = `
                <div id="qr-container-${item.id}">
                  <button class="btn btn-sm btn-primary shadow-sm" onclick="verifyAndShowQR(${item.id})">
                    🔒 ดู QR Code
                  </button>
                </div>
              `;

              return `<tr>
                <td><strong>${item.prefix}${item.firstName} ${item.lastName}</strong></td>
                <td><small class="col-pos">${item.filterType || '-'}</small></td>
                <td><small>${item.internalExtFilter}</small></td>
                <td><small>${combinedDept || '-'}</small></td>
                <td><span class="badge ${badgeClass}">${item.participationType}</span></td>
                <td><span class="badge-item">${item.itemsToReceive || '-'}</span></td>
                <td class="text-center">${btnHtml}</td>
                <td><small>${item.filterProvince}</small></td>
              </tr>`;
            }).join('');
        } else {
            tableCard.style.display = 'block';
            tbody.innerHTML = '<tr><td colspan="8" class="text-center text-danger py-4">ไม่พบข้อมูล</td></tr>'; 
        }
      }

      function setupDropdowns(data) {
        const inOuts = [...new Set(data.map(item => String(item.internalExtFilter)))].filter(d => d.trim() !== "").sort();
        const depts = [...new Set(data.map(item => String(item.filterDept)))].filter(d => d.trim() !== "").sort();
        const provinces = [...new Set(data.map(item => String(item.filterProvince)))].filter(p => p.trim() !== "").sort();
        const types = ['ผู้บริหาร', 'กรรมการ', 'คณะทำงาน', 'ผู้ส่งผลงาน', 'เข้าร่วม(บุคคลธรรมดา)'];
        
        createMultiSelect('inOutFilterContainer', inOuts, 'inout-cb', '-- ทั้งหมด --');
        createMultiSelect('deptFilterContainer', depts, 'dept-cb', '-- ทั้งหมด --');
        createMultiSelect('provinceFilterContainer', provinces, 'prov-cb', '-- ทั้งหมด --');
        createMultiSelect('typeFilterContainer', types, 'type-cb', '-- ทั้งหมด --');
      }

      function createMultiSelect(containerId, options, checkboxClass, placeholder) {
        let html = `
          <div class="dropdown d-grid">
            <button class="btn btn-white border dropdown-toggle text-start d-flex justify-content-between align-items-center" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside" id="${containerId}-btn">
              <span class="text-truncate text-muted" id="${containerId}-text">${placeholder}</span>
            </button>
            <ul class="dropdown-menu p-2">`;
        options.forEach((opt, index) => {
          html += `<li><div class="form-check mb-1"><input class="form-check-input ${checkboxClass}" type="checkbox" value="${opt}" id="${containerId}-${index}" onchange="filterData()"><label class="form-check-label w-100" for="${containerId}-${index}">${opt}</label></div></li>`;
        });
        html += `</ul></div>`;
        document.getElementById(containerId).innerHTML = html;
      }

      function updateBtnText(containerId, selectedArr, defaultText) {
        const textSpan = document.getElementById(`${containerId}-text`);
        textSpan.innerText = selectedArr.length === 0 ? defaultText : (selectedArr.length === 1 ? selectedArr[0] : `เลือกแล้ว (${selectedArr.length})`);
        selectedArr.length === 0 ? textSpan.classList.add('text-muted') : textSpan.classList.remove('text-muted');
      }

      function verifyAndShowQR(id) {
        const item = rawData.find(i => i.id === id);
        if (!item) return;

        const userInput = prompt(`กรุณากรอกรหัสประจำตัวของคุณ ${item.firstName} เพื่อดู QR Code:`);
        if (userInput === null) return; 

        const input = userInput.trim();
        const valA = item.secretA.toString().trim();
        const valB = item.secretB.toString().trim();

        if (input !== "" && (input === valA || input === valB)) {
          let qr1 = item.qrImageCard && item.qrImageCard.startsWith('http') ? 
            `<div class="d-flex flex-column align-items-center">
               <a href="${item.qrImageCard}" target="_blank" title="คลิกเพื่อดูรูปใหญ่">
                 <img src="${item.qrImageCard}" class="qr-img shadow-sm" loading="lazy">
               </a>
               <a href="${item.qrImageCard}" target="_blank" class="btn btn-outline-primary btn-download" download>🔍 ขยาย / บันทึก</a>
             </div>` : '';
               
          let qr2 = item.qrImagePassport && item.qrImagePassport.startsWith('http') ? 
            `<div class="d-flex flex-column align-items-center">
               <a href="${item.qrImagePassport}" target="_blank" title="คลิกเพื่อดูรูปใหญ่">
                 <img src="${item.qrImagePassport}" class="qr-img shadow-sm" loading="lazy">
               </a>
               <a href="${item.qrImagePassport}" target="_blank" class="btn btn-outline-primary btn-download" download>🔍 ขยาย / บันทึก</a>
             </div>` : '';
          
          let finalQrHtml = (qr1 || qr2) ? `<div class="d-flex justify-content-center gap-3">${qr1}${qr2}</div>` : '<span class="text-muted small">ไม่มีรูปภาพ</span>';
          
          document.getElementById(`qr-container-${id}`).innerHTML = finalQrHtml;
        } else {
          alert("❌ รหัสไม่ถูกต้อง! ไม่สามารถแสดง QR Code ได้");
        }
      }
    </script>
  </body>
</html>
