name: Auto Check-in VIP Staff (05:00 Bangkok)

on:
  schedule:
    # 22:00 UTC = 05:00 Bangkok (UTC+7)
    # Run on June 23, 24, 25 UTC → arrives as June 24, 25, 26 Bangkok (event days 1–3)
    - cron: '0 22 23-25 6 *'
  workflow_dispatch:
    inputs:
      force_day:
        description: 'Force event day number (1, 2 or 3). Leave empty to auto-detect.'
        required: false
        default: ''

jobs:
  auto-checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Auto check-in อธิบดี / รองอธิบดี / กองแผนงานฯ
        env:
          SB_URL: https://gvxytnjfyepqhbkmcjms.supabase.co
          SB_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2eHl0bmpmeWVwcWhia21jam1zIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3OTQzMTY0MCwiZXhwIjoyMDk1MDA3NjQwfQ.Hrfc0erkIatyVbmsOW2SU7piH3L65qbS2kdi2eYzbQk
          FORCE_DAY: ${{ github.event.inputs.force_day }}
        run: |
          python3 << 'PYEOF'
          import os, sys, requests
          from datetime import datetime, timezone, timedelta
          from urllib.parse import quote

          SB_URL = os.environ["SB_URL"]
          SB_KEY = os.environ["SB_KEY"]

          HEADERS = {
              "apikey": SB_KEY,
              "Authorization": f"Bearer {SB_KEY}",
              "Content-Type": "application/json",
              "Prefer": "return=minimal",
          }

          # Bangkok timezone UTC+7
          BKK = timezone(timedelta(hours=7))
          today_bkk = datetime.now(BKK).date()

          # Event date → day number mapping
          DAY_MAP = {
              "2026-06-24": 1,
              "2026-06-25": 2,
              "2026-06-26": 3,
          }

          # Allow manual override via workflow_dispatch input
          force = os.environ.get("FORCE_DAY", "").strip()
          if force:
              day = int(force)
              print(f"Manual override: event day {day}")
          else:
              day = DAY_MAP.get(today_bkk.isoformat())
              if day is None:
                  print(f"Today in Bangkok ({today_bkk}) is not an event day. Nothing to do.")
                  sys.exit(0)
              print(f"Auto-detected event day {day} (Bangkok date: {today_bkk})")

          # Departments to auto-check-in (all members, internal participants only)
          TARGET_DEPTS = [
              "อธิบดีกรมวิทยาศาสตร์การแพทย์",
              "รองอธิบดีกรมวิทยาศาสตร์การแพทย์",
              "กองแผนงานและวิชาการ",
          ]

          checkin_time = datetime.now(timezone.utc).isoformat()
          total_ok = 0
          total_skip = 0
          total_err = 0

          for dept in TARGET_DEPTS:
              url = (
                  f"{SB_URL}/rest/v1/participants"
                  f"?dept=eq.{quote(dept)}"
                  f"&is_walkin=not.is.true"
                  f"&select=id,prefix,first_name,last_name"
              )
              r = requests.get(url, headers=HEADERS)
              r.raise_for_status()
              participants = r.json()
              print(f"\n[{dept}] → {len(participants)} คน")

              for p in participants:
                  pid = p["id"]
                  name = f"{p.get('prefix','')} {p.get('first_name','')} {p.get('last_name','')}".strip()

                  # Skip if already checked in for this day
                  check = requests.get(
                      f"{SB_URL}/rest/v1/checkins?participant_id=eq.{pid}&day=eq.{day}&select=id",
                      headers=HEADERS,
                  )
                  check.raise_for_status()
                  if check.json():
                      print(f"  ข้าม  {name} (เช็คอินแล้ว)")
                      total_skip += 1
                      continue

                  # Insert checkin record
                  ins = requests.post(
                      f"{SB_URL}/rest/v1/checkins",
                      headers=HEADERS,
                      json={
                          "participant_id": pid,
                          "day": day,
                          "checkin_time": checkin_time,
                          "scanned_by": "auto",
                      },
                  )
                  if ins.ok or ins.status_code == 201:
                      print(f"  OK    {name}")
                      total_ok += 1
                  else:
                      print(f"  ERROR {name}: {ins.status_code} {ins.text[:120]}")
                      total_err += 1

          print(f"\n{'='*50}")
          print(f"เช็คอินสำเร็จ: {total_ok}  |  ข้าม: {total_skip}  |  ผิดพลาด: {total_err}")
          if total_err:
              sys.exit(1)
          PYEOF
